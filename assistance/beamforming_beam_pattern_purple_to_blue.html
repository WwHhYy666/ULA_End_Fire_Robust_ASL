<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>波束形成算法 (Beamforming) 原理可视化</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    canvas { touch-action: none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-4">波束形成算法 (Beamforming) 原理可视化</h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- 左侧：物理 & 控制区 -->
      <div class="flex flex-col gap-4">
        <div class="bg-white p-4 rounded-xl shadow-md">
          <h2 class="text-lg font-semibold mb-2 text-gray-700">1. 物理场景视图</h2>
          <p class="text-sm text-gray-500 mb-2">红点为声源，下方黑点为麦克风阵列。观察波前到达每个麦克风的时间差。</p>
          <canvas id="physicsCanvas" width="500" height="300" class="w-full h-auto border rounded bg-gray-100"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md">
          <h2 class="text-lg font-semibold mb-4 text-gray-700">控制面板</h2>

          <div class="space-y-6">
            <!-- Source Angle Control -->
            <div>
              <div class="flex justify-between mb-1">
                <label class="text-sm font-medium text-red-600">真实声源角度: <span id="sourceAngleVal">30</span>°</label>
              </div>
              <input type="range" id="sourceAngleInput" min="-80" max="80" value="30"
                     class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500">
            </div>

            <!-- Scan Angle Control -->
            <div>
              <div class="flex justify-between mb-1">
                <label class="text-sm font-medium text-blue-600">算法扫描角度: <span id="scanAngleVal">30</span>°</label>
                <button id="autoLockBtn"
                        class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded hover:bg-blue-200 font-medium transition">
                  自动锁定声源
                </button>
              </div>
              <input type="range" id="scanAngleInput" min="-80" max="80" value="30"
                     class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-500">
              <p class="text-xs text-gray-400 mt-1">
                当扫描角度与声源角度一致时，右侧蓝色波形将完全对齐，总和能量最大。
              </p>
            </div>

            <!-- Mic Count Control -->
            <div>
              <div class="flex justify-between mb-1">
                <label class="text-sm font-medium">麦克风数量: <span id="numMicsVal">8</span></label>
              </div>
              <input type="range" id="numMicsInput" min="2" max="16" value="8"
                     class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="flex gap-2">
              <button id="togglePlayBtn"
                      class="flex-1 px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-700 transition font-medium">
                暂停动画
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：信号处理 & 响应图 -->
      <div class="flex flex-col gap-4">

        <div class="bg-white p-4 rounded-xl shadow-md">
          <h2 class="text-lg font-semibold mb-2 text-gray-700">2. 信号处理 (Delay & Sum)</h2>
          <div class="flex justify-between text-xs text-gray-500 mb-1">
            <span class="text-red-500">红色：原始信号 (物理延时)</span>
            <span class="text-blue-500">蓝色：校正信号 (算法对齐)</span>
          </div>
          <canvas id="signalCanvas" width="500" height="400" class="w-full h-auto border rounded bg-white"></canvas>
          <div class="mt-2 p-2 bg-green-50 rounded border border-green-100">
            <p class="text-sm text-green-800 font-medium">
              原理：
              <span class="font-normal text-gray-600 ml-1">
                只有当“扫描角度”对准声源时，所有通道的蓝色波形才会同相叠加，使底部的绿色输出幅度达到最大。
              </span>
            </p>
          </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md flex flex-col h-full">
          <h2 class="text-lg font-semibold mb-2 text-gray-700">3. 空间谱 / 波束图 (Beam Pattern)</h2>
          <p class="text-sm text-gray-500 mb-2">
            阵列对所有角度的响应能量分布（填充色：从中心深紫到外圈浅蓝渐变）：
          </p>
          <div class="flex-1 flex justify-center items-center">
            <canvas id="responseCanvas" width="520" height="320" class="w-full max-w-2xl h-auto"></canvas>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // --- 状态变量 ---
    const state = {
      sourceAngle: 30,
      scanAngle: 30,
      numMics: 8,
      isPlaying: true
    };

    // --- 常量 ---
    const MIC_SPACING = 20;
    const WAVE_SPEED = 2;
    const K_FACTOR = 0.12;
    let time = 0;
    let animationFrameId;

    // --- DOM 元素 ---
    const els = {
      sourceInput: document.getElementById('sourceAngleInput'),
      scanInput: document.getElementById('scanAngleInput'),
      micsInput: document.getElementById('numMicsInput'),
      sourceVal: document.getElementById('sourceAngleVal'),
      scanVal: document.getElementById('scanAngleVal'),
      micsVal: document.getElementById('numMicsVal'),
      autoLockBtn: document.getElementById('autoLockBtn'),
      playBtn: document.getElementById('togglePlayBtn'),
      physCanvas: document.getElementById('physicsCanvas'),
      sigCanvas: document.getElementById('signalCanvas'),
      respCanvas: document.getElementById('responseCanvas')
    };

    const ctxs = {
      phys: els.physCanvas.getContext('2d'),
      sig: els.sigCanvas.getContext('2d'),
      resp: els.respCanvas.getContext('2d')
    };

    // --- 核心算法 ---
    function getMicPositions(count) {
      const mics = [];
      const totalWidth = (count - 1) * MIC_SPACING;
      const startX = -totalWidth / 2;
      for (let i = 0; i < count; i++) mics.push(startX + i * MIC_SPACING);
      return mics;
    }

    function calculateDelays(targetAngleDeg, mics) {
      const angleRad = (targetAngleDeg * Math.PI) / 180;
      return mics.map(x => x * Math.sin(angleRad));
    }

    // --- 绘图函数 ---
    function drawPhysicsView(ctx, width, height) {
      ctx.clearRect(0, 0, width, height);
      const centerX = width / 2;
      const centerY = height - 50;
      const mics = getMicPositions(state.numMics);

      ctx.fillStyle = '#333';
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      mics.forEach(x => {
        ctx.beginPath();
        ctx.arc(centerX + x, centerY, 4, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.beginPath();
      ctx.moveTo(centerX + mics[0], centerY);
      ctx.lineTo(centerX + mics[mics.length - 1], centerY);
      ctx.stroke();

      const sourceDist = 200;
      const srcRad = (state.sourceAngle * Math.PI) / 180;
      const srcX = centerX + sourceDist * Math.sin(srcRad);
      const srcY = centerY - sourceDist * Math.cos(srcRad);

      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(srcX, srcY, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = "12px sans-serif";
      ctx.fillText("声源", srcX + 12, srcY);

      ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
      ctx.lineWidth = 2;

      const waveDirection = Math.atan2(centerY - srcY, centerX - srcX);
      const maxR = 300;
      for (let r = 0; r < maxR; r += 20) {
        const currentR = (r - time * WAVE_SPEED) % maxR;
        const drawR = currentR < 0 ? currentR + maxR : currentR;
        ctx.beginPath();
        ctx.arc(srcX, srcY, drawR, waveDirection - 0.8, waveDirection + 0.8);
        ctx.stroke();
      }

      const scanRad = (state.scanAngle * Math.PI) / 180;
      const scanLen = 220;
      const scanX = centerX + scanLen * Math.sin(scanRad);
      const scanY = centerY - scanLen * Math.cos(scanRad);

      ctx.strokeStyle = '#3b82f6';
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(scanX, scanY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#3b82f6';
      ctx.fillText("Scanning Direction", scanX, scanY - 10);
    }

    function drawSignalView(ctx, width, height) {
      ctx.clearRect(0, 0, width, height);
      const mics = getMicPositions(state.numMics);

      const realDelays = calculateDelays(state.sourceAngle, mics);
      const steeringDelays = calculateDelays(state.scanAngle, mics);

      const SUM_AREA_HEIGHT = 100;
      const channelsAreaHeight = height - SUM_AREA_HEIGHT;

      const rowHeightRaw = channelsAreaHeight / state.numMics;
      const rowHeight = Math.min(rowHeightRaw, 50);
      const scaleY = Math.min(rowHeight * 0.4, 20);

      mics.forEach((mic, i) => {
        const yBase = i * rowHeight + rowHeight / 2 + 10;

        ctx.strokeStyle = '#eee';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, yBase);
        ctx.lineTo(width, yBase);
        ctx.stroke();

        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let px = 0; px < width; px++) {
          const xVal = (px - width / 2);
          const phase = (xVal * K_FACTOR) - time * 0.2 + (realDelays[i] * K_FACTOR);
          const waveY = Math.sin(phase) * scaleY;
          if (px === 0) ctx.moveTo(px, yBase + waveY);
          else ctx.lineTo(px, yBase + waveY);
        }
        ctx.stroke();

        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let px = 0; px < width; px++) {
          const xVal = (px - width / 2);
          const phase = (xVal * K_FACTOR) - time * 0.2 + (realDelays[i] * K_FACTOR) - (steeringDelays[i] * K_FACTOR);
          const waveY = Math.sin(phase) * scaleY;
          if (px === 0) ctx.moveTo(px, yBase + waveY);
          else ctx.lineTo(px, yBase + waveY);
        }
        ctx.stroke();
      });

      const sumYBase = height - (SUM_AREA_HEIGHT / 2);
      ctx.fillStyle = "#000";
      ctx.font = "12px sans-serif";
      ctx.fillText("波束形成输出 (Σ Sum)", 10, height - SUM_AREA_HEIGHT + 20);

      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 3;
      ctx.beginPath();

      const sumScaleY = Math.min(scaleY * 1.5, 35);
      for (let px = 0; px < width; px++) {
        let sumVal = 0;
        const xVal = (px - width / 2);
        for (let i = 0; i < state.numMics; i++) {
          const phase = (xVal * K_FACTOR) - time * 0.2 + (realDelays[i] * K_FACTOR) - (steeringDelays[i] * K_FACTOR);
          sumVal += Math.sin(phase);
        }
        const plotVal = (sumVal / state.numMics) * sumScaleY;
        if (px === 0) ctx.moveTo(px, sumYBase + plotVal);
        else ctx.lineTo(px, sumYBase + plotVal);
      }
      ctx.stroke();

      if (Math.abs(state.sourceAngle - state.scanAngle) < 5) {
        ctx.strokeStyle = "rgba(34, 197, 94, 0.5)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(width / 2, 0);
        ctx.lineTo(width / 2, height);
        ctx.stroke();
      }
    }

    // ✅ 角度标签：移到半圆外侧 + 加粗黑色
    function drawResponsePattern(ctx, width, height) {
      ctx.clearRect(0, 0, width, height);

      const PAD_X = 44;          // ✅ 略加大：给外侧标签留空间
      const PAD_TOP = 30;        // ✅ 略加大：给顶部外侧标签留空间
      const PAD_BOTTOM = 30;

      const centerX = width / 2;
      const bottomY = height - PAD_BOTTOM;

      const radius = Math.min(width / 2 - PAD_X, height - PAD_TOP - PAD_BOTTOM);

      const mics = getMicPositions(state.numMics);
      const realDelays = calculateDelays(state.sourceAngle, mics);

      // axis: 半圆
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 1.5;
      ctx.arc(centerX, bottomY, radius, Math.PI, 0, false);
      ctx.stroke();

      // gradients
      const grad = ctx.createRadialGradient(centerX, bottomY, 0, centerX, bottomY, radius);
      grad.addColorStop(0.00, 'rgba(76, 29, 149, 0.55)');
      grad.addColorStop(0.55, 'rgba(99, 102, 241, 0.28)');
      grad.addColorStop(1.00, 'rgba(147, 197, 253, 0.25)');

      const strokeGrad = ctx.createLinearGradient(centerX - radius, bottomY, centerX + radius, bottomY);
      strokeGrad.addColorStop(0.00, 'rgba(99, 102, 241, 0.85)');
      strokeGrad.addColorStop(1.00, 'rgba(59, 130, 246, 0.85)');

      // beam pattern
      ctx.beginPath();
      ctx.strokeStyle = strokeGrad;
      ctx.fillStyle = grad;
      ctx.lineWidth = 2;

      for (let deg = -90; deg <= 90; deg += 2) {
        const steerDelays = calculateDelays(deg, mics);
        let realSum = 0;
        let imagSum = 0;

        for (let i = 0; i < state.numMics; i++) {
          const phaseDiff = (realDelays[i] - steerDelays[i]) * K_FACTOR;
          realSum += Math.cos(phaseDiff);
          imagSum += Math.sin(phaseDiff);
        }

        const magnitude = Math.sqrt(realSum * realSum + imagSum * imagSum);
        const normalizedMag = magnitude / state.numMics;

        const plotR = normalizedMag * radius;
        const rad = (deg * Math.PI) / 180;
        const px = centerX + plotR * Math.sin(rad);
        const py = bottomY - plotR * Math.cos(rad);

        if (deg === -90) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }

      ctx.lineTo(centerX, bottomY);
      ctx.closePath();
      ctx.stroke();
      ctx.fill();

      // --- guides ---
      const guideAngles = [0, -30, -60, 30, 60];
      const labelMap = {
        0: "90°",
        "-30": "60°",
        "-60": "30°",
        30: "120°",
        60: "150°"
      };

      const edgeGuides = [
        { deg: -90, text: "0°" },
        { deg: 90,  text: "180°" }
      ];

      // dashed lines
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = 'rgba(0,0,0,0.22)';
      ctx.lineWidth = 1;

      [...guideAngles, ...edgeGuides.map(e => e.deg)].forEach(deg => {
        const rad = (deg * Math.PI) / 180;
        const gx = centerX + radius * Math.sin(rad);
        const gy = bottomY - radius * Math.cos(rad);
        ctx.beginPath();
        ctx.moveTo(centerX, bottomY);
        ctx.lineTo(gx, gy);
        ctx.stroke();
      });

      // ✅ labels outside + bold black
      ctx.setLineDash([]);
      ctx.fillStyle = '#000';
      ctx.font = "bold 20px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const OUT_R = radius + 12; // ✅ 放到半圆外侧

      // original labels
      guideAngles.forEach(deg => {
        const rad = (deg * Math.PI) / 180;
        const lx = centerX + OUT_R * Math.sin(rad);
        const ly = bottomY - OUT_R * Math.cos(rad);

        // 轻微偏移：避免与半圆边缘/端点贴得太紧
        let ox = 0, oy = 0;
        if (deg === 0) oy = -6;
        if (deg < 0) ox = -10;
        if (deg > 0) ox = 10;

        ctx.fillText(labelMap[deg] ?? `${deg}°`, lx + ox, ly + oy);
      });


      ctx.restore();

      // mark source
      const srcRad = (state.sourceAngle * Math.PI) / 180;
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(centerX, bottomY);
      ctx.lineTo(centerX + radius * Math.sin(srcRad), bottomY - radius * Math.cos(srcRad));
      ctx.stroke();

      // mark scan
      const scanRad = (state.scanAngle * Math.PI) / 180;
      ctx.strokeStyle = '#000';
      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(centerX, bottomY);
      ctx.lineTo(centerX + radius * 0.8 * Math.sin(scanRad), bottomY - radius * 0.8 * Math.cos(scanRad));
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // --- 交互 & 动画循环 ---
    function updateUI() {
      els.sourceVal.textContent = state.sourceAngle;
      els.scanVal.textContent = state.scanAngle;
      els.micsVal.textContent = state.numMics;

      els.sourceInput.value = state.sourceAngle;
      els.scanInput.value = state.scanAngle;
      els.micsInput.value = state.numMics;
    }

    function loop() {
      if (state.isPlaying) time += 1;

      drawPhysicsView(ctxs.phys, els.physCanvas.width, els.physCanvas.height);
      drawSignalView(ctxs.sig, els.sigCanvas.width, els.sigCanvas.height);
      drawResponsePattern(ctxs.resp, els.respCanvas.width, els.respCanvas.height);

      animationFrameId = requestAnimationFrame(loop);
    }

    // listeners
    els.sourceInput.addEventListener('input', (e) => {
      state.sourceAngle = parseInt(e.target.value);
      updateUI();
    });

    els.scanInput.addEventListener('input', (e) => {
      state.scanAngle = parseInt(e.target.value);
      updateUI();
    });

    els.micsInput.addEventListener('input', (e) => {
      state.numMics = parseInt(e.target.value);
      updateUI();
    });

    els.autoLockBtn.addEventListener('click', () => {
      state.scanAngle = state.sourceAngle;
      updateUI();
    });

    els.playBtn.addEventListener('click', () => {
      state.isPlaying = !state.isPlaying;
      els.playBtn.textContent = state.isPlaying ? "暂停动画" : "播放动画";
    });

    // init
    updateUI();
    loop();
  </script>
</body>
</html>
